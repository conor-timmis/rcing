<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue panel — rcing.net</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="/" class="logo">
        <img src="https://oldschool.runescape.wiki/images/Runecraft_icon.png" alt="" width="28" height="28">
        <span class="logo-text">rcing.net</span>
      </a>
    </header>

    <main class="content auth-content">
      <div class="page-toolbar">
        <h1 class="page-title">Issue panel</h1>
        <div class="toolbar-actions" id="auth-actions"></div>
      </div>

      <p class="panel-note">
        <strong>Complete</strong> — issue fixed on the site, remove ticket.
        <strong>Delete</strong> — dismiss without changes (spam, invalid, etc.).
      </p>

      <div id="access-gate" class="auth-panel" hidden>
        <p id="access-message">Checking access…</p>
        <a class="btn" id="access-link" href="/login?next=/admin" hidden>Sign in</a>
      </div>

      <section id="admin-panel" hidden>
        <div class="status" id="admin-status"></div>
        <table class="data-table" id="issues-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Issue</th>
              <th>Submitted</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <footer class="site-footer">
      rcing.net 2026 · <a href="/issues">Report an issue</a> · <a href="/login">Admin login</a>
    </footer>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const accessGate = document.getElementById("access-gate");
    const accessMessage = document.getElementById("access-message");
    const accessLink = document.getElementById("access-link");
    const adminPanel = document.getElementById("admin-panel");
    const authActions = document.getElementById("auth-actions");
    const tbody = document.querySelector("#issues-table tbody");
    const status = document.getElementById("admin-status");

    function showStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle("status-error", isError);
    }

    function renderAuthActions(user) {
      authActions.innerHTML = "";
      if (!user) return;

      const label = document.createElement("span");
      label.className = "user-label";
      label.textContent = user.username;

      const logoutBtn = document.createElement("button");
      logoutBtn.type = "button";
      logoutBtn.className = "btn btn-secondary";
      logoutBtn.textContent = "Sign out";
      logoutBtn.addEventListener("click", async () => {
        await logout();
        window.location.reload();
      });

      authActions.append(label, logoutBtn);
    }

    function renderIssues(issues) {
      tbody.innerHTML = "";
      if (!issues.length) {
        tbody.innerHTML = '<tr><td colspan="5">No open issues.</td></tr>';
        return;
      }

      for (const issue of issues) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${issue.id}</td>
          <td>${escapeHtml(issue.name)}</td>
          <td><div class="issue-body-preview">${escapeHtml(issue.body)}</div></td>
          <td>${formatWhen(issue.createdAt)}</td>
          <td class="action-cell">
            <button type="button" class="btn btn-small btn-complete" data-action="complete" data-id="${issue.id}">Complete</button>
            <button type="button" class="btn btn-small btn-delete" data-action="delete" data-id="${issue.id}">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }
    }

    async function loadIssues() {
      showStatus("Loading issues…");
      const { issues } = await fetchAllIssues();
      renderIssues(issues);
      showStatus(`${issues.length} open issue${issues.length === 1 ? "" : "s"}.`);
    }

    tbody.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const id = button.dataset.id;
      const action = button.dataset.action;
      const label = action === "complete" ? "Complete" : "Delete";

      if (!window.confirm(`${label} issue #${id}? This removes it from the queue.`)) {
        return;
      }

      try {
        await resolveIssue(id, action);
        await loadIssues();
      } catch (err) {
        showStatus(err.message, true);
      }
    });

    (async () => {
      const { user } = await fetchMe();
      renderAuthActions(user);
      accessGate.hidden = false;

      if (!user) {
        accessMessage.textContent = "Sign in to view submitted issues.";
        accessLink.hidden = false;
        return;
      }

      if (user.role !== "admin") {
        accessMessage.textContent = "Admin access only.";
        accessLink.textContent = "Back to home";
        accessLink.href = "/";
        accessLink.hidden = false;
        return;
      }

      accessGate.hidden = true;
      adminPanel.hidden = false;

      try {
        await loadIssues();
      } catch (err) {
        showStatus(err.message, true);
      }
    })();
  </script>
</body>
</html>
